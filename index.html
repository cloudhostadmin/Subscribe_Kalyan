<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>कल्याण शताब्दी वर्ष — New Subscription</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            background:linear-gradient(135deg,#fff9e6 0%,#fffbf0 50%,#fff9e6 100%);
            min-height:100vh; padding:20px;
            display:flex; justify-content:center; align-items:flex-start;
        }

        .container {
            background:#fff; border-radius:15px;
            box-shadow:0 10px 40px rgba(218,165,32,0.15);
            max-width:600px; width:100%; padding:40px;
            border:2px solid #f5e6c3;
            animation:fadeIn .5s ease; margin:20px auto;
        }

        @keyframes fadeIn {
            from { opacity:0; transform:translateY(-20px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* ── HEADER ── */
        .header-section {
            margin-bottom:30px; border-bottom:3px solid #d4a017;
            padding-bottom:20px; display:flex;
            align-items:center; justify-content:space-between; gap:30px;
        }
        .header-text { flex:1; text-align:left; }
        .header-image { width:var(--logo-size,180px); height:var(--logo-size,180px); object-fit:contain; flex-shrink:0; }
        h1 { color:#c17817; font-size:28px; margin:0 0 10px; font-weight:700; text-shadow:1px 1px 2px rgba(193,120,23,.1); }
        .sub-heading { color:#8b6914; font-size:16px; font-weight:600; margin-top:5px; text-transform:uppercase; letter-spacing:1px; }
        .sub-heading-note { color:#666; font-size:13px; font-weight:500; margin-top:8px; font-style:italic; }

        /* ── FORM ── */
        .form-group { margin-bottom:20px; }
        .form-row { display:grid; grid-template-columns:1fr 2fr 2fr; gap:15px; margin-bottom:20px; }
        .form-row .form-group { margin-bottom:0; }

        label { display:block; margin-bottom:8px; color:#333; font-weight:600; font-size:14px; }

        input, textarea {
            width:100%; padding:12px; border:2px solid #e0e0e0;
            border-radius:8px; font-size:14px; transition:all .3s ease;
            font-family:inherit; background:#fff;
        }
        input:disabled { background:#f5f5f5; cursor:not-allowed; color:#666; }
        input:not(:disabled):focus, textarea:focus {
            outline:none; border-color:#d4a017;
            box-shadow:0 0 0 3px rgba(212,160,23,.1);
        }
        textarea { resize:vertical; min-height:80px; }

        .char-count { text-align:right; font-size:12px; color:#999; margin-top:5px; }

        .pincode-status { font-size:12px; margin-top:5px; padding:5px; border-radius:4px; }
        .pincode-status.loading { color:#c17817; background:#fffbf0; border:1px solid #f5e6c3; }
        .pincode-status.success { color:#28a745; background:#d4edda; }
        .pincode-status.error   { color:#dc3545; background:#f8d7da; }

        /* ── BUTTONS ── */
        .submit-btn {
            width:100%; padding:15px;
            background:linear-gradient(135deg,#d4a017 0%,#c17817 100%);
            color:#fff; border:none; border-radius:8px;
            font-size:16px; font-weight:600; cursor:pointer;
            transition:all .3s ease; margin-top:10px; font-family:inherit;
        }
        .submit-btn:hover:not(:disabled) {
            transform:translateY(-2px);
            box-shadow:0 10px 25px rgba(212,160,23,.4);
            background:linear-gradient(135deg,#e5b01f 0%,#d08820 100%);
        }
        .submit-btn:disabled { opacity:.6; cursor:not-allowed; }
        .required { color:#e74c3c; }

        .hidden { display:none !important; }


        /* ── LOADING ── */
        .loading-overlay {
            position:fixed; inset:0; background:rgba(255,249,230,.95);
            display:flex; align-items:center; justify-content:center;
            z-index:9999; backdrop-filter:blur(5px);
        }
        .loading-spinner {
            background:#fff; padding:30px 40px; border-radius:10px;
            text-align:center; box-shadow:0 10px 40px rgba(212,160,23,.3);
            border:2px solid #f5e6c3;
        }
        .spinner {
            border:4px solid #f5e6c3; border-top:4px solid #d4a017;
            border-radius:50%; width:40px; height:40px;
            animation:spin 1s linear infinite; margin:0 auto 15px;
        }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        .loading-spinner p { color:#333; font-weight:500; }

        @media(max-width:600px){
            .container { padding:25px; }
            .header-section { flex-direction:column; align-items:center; text-align:center; gap:15px; }
            .header-text { text-align:center; }
            .header-image { width:calc(var(--logo-size,180px)*.7); height:calc(var(--logo-size,180px)*.7); }
            h1 { font-size:22px; }
            .form-row { grid-template-columns:1fr; gap:0; }
            .form-row .form-group { margin-bottom:20px; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- LOADING OVERLAY -->
    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p id="loadingMessage">Processing...</p>
        </div>
    </div>

    <!-- HEADER -->
    <div class="header-section">
        <div class="header-text">
            <h1>कल्याण शताब्दी वर्ष</h1>
            <div class="sub-heading">Kalyan 2026</div>
            <div class="sub-heading-note">New Subscriptions Form</div>
        </div>
        <img src="https://raw.githubusercontent.com/cloudhostadmin/KALYAN_CENTURY_2026/main/kal2026.jpeg"
             alt="Kalyan Logo" class="header-image" id="rightLogo"
             onerror="this.style.display='none'">
    </div>

    <!-- MAIN FORM -->
    <form id="kalyanForm">
        <!-- Hidden tracking fields (auto-filled from QR URL) -->
        <input type="hidden" id="customerId"  name="customerId"  value="">
        <input type="hidden" id="sellerId"    name="sellerId"    value="">
        <input type="hidden" id="sellerName"  name="sellerName"  value="">
        <input type="hidden" id="paymentLink" name="paymentLink" value="">

        <div class="form-group">
            <label for="firstName">First Name <span class="required">*</span></label>
            <input type="text" id="firstName" name="firstName" required placeholder="Enter first name">
        </div>

        <div class="form-group">
            <label for="lastName">Last Name <span class="required">*</span></label>
            <input type="text" id="lastName" name="lastName" required placeholder="Enter last name">
        </div>

        <div class="form-group">
            <label for="address1">Address 1 <span class="required">*</span></label>
            <input type="text" id="address1" name="address1" required maxlength="40" placeholder="House / Flat No., Building">
            <div class="char-count"><span id="address1Count">0</span>/40</div>
        </div>

        <div class="form-group">
            <label for="address2">Address 2 <span class="required">*</span></label>
            <input type="text" id="address2" name="address2" required maxlength="40" placeholder="Street / Colony / Area">
            <div class="char-count"><span id="address2Count">0</span>/40</div>
        </div>

        <div class="form-group">
            <label for="address3">Address 3</label>
            <input type="text" id="address3" name="address3" maxlength="40" placeholder="Landmark (optional)">
            <div class="char-count"><span id="address3Count">0</span>/40</div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="pincode">Pincode <span class="required">*</span></label>
                <input type="text" id="pincode" name="pincode" required pattern="[0-9]{6}" maxlength="6" placeholder="6-digit" inputmode="numeric">
                <div id="pincodeStatus" class="pincode-status" style="display:none;"></div>
            </div>
            <div class="form-group">
                <label for="city">City <span class="required">*</span></label>
                <input type="text" id="city" name="city" required placeholder="Auto-filled">
            </div>
            <div class="form-group">
                <label for="state">State <span class="required">*</span></label>
                <input type="text" id="state" name="state" required placeholder="Auto-filled">
            </div>
        </div>

        <div class="form-group">
            <label for="mobileNumber">Mobile Number <span class="required">*</span></label>
            <input type="tel" id="mobileNumber" name="mobileNumber" required
                   pattern="[0-9]{10}" maxlength="10"
                   placeholder="10-digit mobile number" inputmode="numeric">
        </div>

        <div class="form-group">
            <label for="emailId">Email ID</label>
            <input type="email" id="emailId" name="emailId"
                   placeholder="Please provide for easier communications">
        </div>

        <div class="form-group">
            <label for="alternateMobile">Alternate Mobile / WhatsApp Number</label>
            <input type="tel" id="alternateMobile" name="alternateMobile"
                   placeholder="Enter alternate number (optional)"
                   pattern="[0-9]{10}" maxlength="10" inputmode="numeric">
        </div>

        <!-- Remarks hidden by default -->
        <div class="form-group hidden">
            <label for="remarks">Remarks</label>
            <textarea id="remarks" name="remarks" maxlength="200" placeholder="Any remarks..."></textarea>
            <div class="char-count"><span id="charCount">0</span>/200</div>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn">
            Submit &amp; Proceed to Payment
        </button>
    </form>

</div>
<script>
'use strict';

// ══════════════════════════════════════════════════════════════
//  ⚙️  STEP 1: PASTE YOUR APPS SCRIPT URL HERE AFTER DEPLOYING
// ══════════════════════════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx28H2sgZsx1TvBA-V94yActYDJcPwFpP-XPa0pl8rMP8Bm3ftm87pi-0qe3s0YsA10kg/exec';
// ══════════════════════════════════════════════════════════════

// ── URL PARAM READER ──────────────────────────────────────────
function getParam(name) {
    let v = new URLSearchParams(window.location.search).get(name);
    if (!v && window.location.hash)
        v = new URLSearchParams(window.location.hash.substring(1)).get(name);
    return v ? decodeURIComponent(v) : '';
}

// ── POPULATE FORM FROM QR URL ─────────────────────────────────
function populateFromUrl() {
    // Map url param → field id
    const map = {
        customerId:'customerId', firstName:'firstName', lastName:'lastName',
        address1:'address1', address2:'address2', address3:'address3',
        pincode:'pincode', city:'city', state:'state',
        mobile:'mobileNumber', mobileNumber:'mobileNumber',
        email:'emailId', alternateMobile:'alternateMobile',
    };
    Object.entries(map).forEach(([param, fieldId]) => {
        const val = getParam(param);
        if (val) { const el = document.getElementById(fieldId); if (el && !el.value) el.value = val; }
    });

    // Payment link (comes from QR or use hardcoded default)
    const pl = getParam('paymentLink') || 'https://p.ppsl.io/PYTMPS/f4FEqk';
    document.getElementById('paymentLink').value = pl;

    // Seller info stored silently in hidden fields only (not shown to user)
    const sid   = getParam('sellerId');
    const sname = getParam('sellerName');
    if (sid) {
        document.getElementById('sellerId').value   = sid;
        document.getElementById('sellerName').value = sname;
    }

    // Custom logo & size
    const logo = getParam('rightLogo');
    const sz   = parseInt(getParam('logoSize'));
    if (logo) document.getElementById('rightLogo').src = logo;
    if (sz > 0 && sz <= 300)
        document.documentElement.style.setProperty('--logo-size', sz + 'px');

    // Auto pincode lookup if pincode in URL
    const pin = document.getElementById('pincode').value;
    if (pin.length === 6 && !document.getElementById('city').value)
        fetchPincode(pin);
}

// ── PINCODE → CITY / STATE ────────────────────────────────────
async function fetchPincode(pin) {
    const ps = document.getElementById('pincodeStatus');
    ps.textContent = '🔍 Fetching location...';
    ps.className = 'pincode-status loading';
    ps.style.display = 'block';
    try {
        const r = await fetch('https://api.postalpincode.in/pincode/' + pin);
        const d = await r.json();
        if (d?.[0]?.Status === 'Success' && d[0].PostOffice?.length) {
            const po = d[0].PostOffice[0];
            document.getElementById('city').value  = po.District || po.Block || '';
            document.getElementById('state').value = po.State || '';
            ps.textContent = '✅ Location found!'; ps.className = 'pincode-status success';
            setTimeout(() => ps.style.display = 'none', 3000);
        } else { throw 0; }
    } catch {
        ps.textContent = '❌ Invalid pincode — enter city/state manually';
        ps.className = 'pincode-status error';
        setTimeout(() => ps.style.display = 'none', 4000);
    }
}
document.getElementById('pincode').addEventListener('input', function() {
    if (this.value.length === 6) fetchPincode(this.value);
    else document.getElementById('pincodeStatus').style.display = 'none';
});

// ── CHAR COUNTERS ─────────────────────────────────────────────
[['address1','address1Count'],['address2','address2Count'],['address3','address3Count']].forEach(([id,cid]) => {
    const el = document.getElementById(id);
    el.addEventListener('input', () => document.getElementById(cid).textContent = el.value.length);
    document.getElementById(cid).textContent = el.value.length;
});
document.getElementById('remarks').addEventListener('input', function() {
    document.getElementById('charCount').textContent = this.value.length;
});

// ── LOADING ───────────────────────────────────────────────────
function showLoading(msg) {
    document.getElementById('loadingMessage').textContent = msg;
    document.getElementById('loadingOverlay').classList.remove('hidden');
}
function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }

// ── INIT ──────────────────────────────────────────────────────
populateFromUrl();



// ── FORM SUBMIT → APPS SCRIPT → PAYMENT REDIRECT ─────────────
document.getElementById('kalyanForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    // Basic mobile validation
    const mobile = document.getElementById('mobileNumber').value.trim();
    if (!/^\d{10}$/.test(mobile)) {
        alert('Please enter a valid 10-digit mobile number.');
        return;
    }


    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Submitting...';
    showLoading('Saving your details...');

    const paymentLink = document.getElementById('paymentLink').value || 'https://p.ppsl.io/PYTMPS/f4FEqk';

    const payload = {
        action:          'newSubscription',          // tells Apps Script what to do
        timestamp:       new Date().toISOString(),
        sellerId:        document.getElementById('sellerId').value,
        sellerName:      document.getElementById('sellerName').value,
        customerId:      document.getElementById('customerId').value,
        firstName:       document.getElementById('firstName').value,
        lastName:        document.getElementById('lastName').value,
        address1:        document.getElementById('address1').value,
        address2:        document.getElementById('address2').value,
        address3:        document.getElementById('address3').value,
        pincode:         document.getElementById('pincode').value,
        city:            document.getElementById('city').value,
        state:           document.getElementById('state').value,
        mobileNumber:    mobile,
        emailId:         document.getElementById('emailId').value,
        alternateMobile: document.getElementById('alternateMobile').value,
        remarks:         document.getElementById('remarks').value,
        paymentStatus:   'PENDING',                  // will be updated by webhook
        paymentLink:     paymentLink,
    };

    try {
        await fetch(APPS_SCRIPT_URL, {
            method:  'POST',
            mode:    'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(payload)
        });

        hideLoading();

        // Redirect immediately to payment
        window.location.href = paymentLink;

    } catch (err) {
        hideLoading();
        alert('Network error. Please check your connection and try again.');
        btn.disabled    = false;
        btn.textContent = 'Submit & Proceed to Payment';
    }
});
</script>
</body>
</html>
